<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Angela Cheong — angechyz.com</title>
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=DM+Serif+Display:ital@0;1&family=Cormorant+Garamond:ital,wght@0,400;0,600;1,400;1,600&family=DM+Sans:ital,opsz,wght@0,9..40,300;0,9..40,400;0,9..40,500;1,9..40,300&display=swap" rel="stylesheet" />
  <script src="https://unpkg.com/react@18.3.1/umd/react.development.js" integrity="sha384-hD6/rw4ppMLGNu3tX5cjIb+uRZ7UkRJ6BPkLpg4hAu/6onKUg4lLsHAs9EBPT82L" crossorigin="anonymous"></script>
  <script src="https://unpkg.com/react-dom@18.3.1/umd/react-dom.development.js" integrity="sha384-u6aeetuaXnQ38mYT8rp6sbXaQe3NL9t+IBXmnYxwkUI2Hw4bsp2Wvmx4yRQF1uAm" crossorigin="anonymous"></script>
  <script src="https://unpkg.com/@babel/standalone@7.29.0/babel.min.js" integrity="sha384-m08KidiNqLdpJqLq95G/LEi8Qvjl/xUYll3QILypMoQ65QorJ9Lvtp2RXYGBFj1y" crossorigin="anonymous"></script>
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    :root {
      --bg: #faf9f6;
      --bg-warm: #f5f3ee;
      --ink: #1a1714;
      --ink-mid: #6b6560;
      --ink-light: #a09890;
      --accent: #ff4013;
      --rule: #e4e0d8;
      --serif: 'DM Serif Display', Georgia, serif;
      --cormorant: 'Cormorant Garamond', Georgia, serif;
      --sans: 'DM Sans', system-ui, sans-serif;
      --gutter: clamp(28px, 7vw, 100px);
      --max: 1140px;
    }

    html { font-size: 16px; scroll-behavior: smooth; }
    body {
      font-family: var(--sans);
      background: var(--bg);
      color: var(--ink);
      -webkit-font-smoothing: antialiased;
      min-height: 100vh;
    }
    #root { min-height: 100vh; display: flex; flex-direction: column; }

    /* ── NAV ── */
    nav {
      position: fixed; top: 0; left: 0; right: 0; z-index: 200;
      height: 60px; padding: 0 var(--gutter);
      display: flex; align-items: center; justify-content: space-between;
      background: var(--bg);
      border-bottom: 1px solid var(--rule);
      transition: background 0.3s, border-color 0.3s;
    }
    nav.dark { background: #141210; border-bottom-color: #2a2620; }
    .nav-logo {
      font-family: var(--serif); font-size: 1.05rem; letter-spacing: 0.01em;
      color: var(--ink); background: none; border: none; cursor: pointer; padding: 0;
    }
    nav.dark .nav-logo { color: #e8e4dc; }
    .nav-links { display: flex; gap: 28px; align-items: center; list-style: none; }
    .nav-links a, .nav-links button {
      font-family: var(--sans); font-size: 0.72rem; font-weight: 400;
      letter-spacing: 0.1em; text-transform: uppercase;
      color: var(--ink-mid); text-decoration: none;
      background: none; border: none; cursor: pointer; padding: 0;
      transition: color 0.18s;
    }
    nav.dark .nav-links a, nav.dark .nav-links button { color: #cfe6e7; }
    .nav-links a:hover, .nav-links button:hover { color: var(--ink); }
    nav.dark .nav-links a:hover, nav.dark .nav-links button:hover { color: #ffffff; }
    .nav-cta {
      font-size: 0.68rem !important; letter-spacing: 0.1em; padding: 7px 16px !important;
      background: var(--ink) !important; color: var(--bg) !important;
      text-transform: uppercase !important; border-radius: 1px;
      transition: opacity 0.18s !important;
    }
    .nav-cta:hover { opacity: 0.72 !important; color: var(--bg) !important; }
    nav.dark .nav-cta { background: #e8e4dc !important; color: #141210 !important; }

    /* ── PAGE ── */
    .page { padding-top: 60px; flex: 1; }
    .page-enter { animation: fadeUp 0.4s ease both; }
    @keyframes fadeUp {
      from { opacity: 0; transform: translateY(12px); }
      to   { opacity: 1; transform: translateY(0); }
    }

    /* ── TYPOGRAPHY SYSTEM ── */
    /* Bold display serif for main headlines */
    .h-display {
      font-family: var(--serif);
      font-weight: 400;
      line-height: 1.0;
      letter-spacing: -0.025em;
      color: var(--ink);
    }
    /* Cormorant for secondary/italic accents */
    .h-accent {
      font-family: var(--cormorant);
      font-style: italic;
      font-weight: 400;
      line-height: 1.0;
    }
    .body-text {
      font-family: var(--sans); font-weight: 300;
      font-size: clamp(0.9rem, 1.3vw, 1rem);
      line-height: 1.8; color: var(--ink-mid);
    }
    .eyebrow {
      font-family: var(--sans); font-size: 0.68rem; font-weight: 400;
      letter-spacing: 0.16em; text-transform: uppercase; color: var(--ink-light);
    }

    /* ── BUTTONS ── */
    .btn {
      display: inline-flex; align-items: center; gap: 8px;
      font-family: var(--sans); font-size: 0.72rem; font-weight: 400;
      letter-spacing: 0.1em; text-transform: uppercase;
      text-decoration: none; padding: 12px 24px;
      cursor: pointer; border: none; transition: opacity 0.18s, transform 0.16s;
    }
    .btn:hover { opacity: 0.75; transform: translateY(-1px); }
    .btn-ink { background: var(--ink); color: var(--bg); }
    .btn-outline { background: transparent; color: var(--ink); border: 1px solid #c8c2b8; }
    .btn-outline:hover { border-color: var(--ink); }
    .btn-outline-light { background: transparent; color: #d0cbc2; border: 1px solid #3a3630; }
    .btn-outline-light:hover { border-color: #6b6560; color: #e8e4dc; }
    .btn-light { background: var(--bg); color: var(--ink); }
    .btn-group { display: flex; gap: 12px; flex-wrap: wrap; align-items: center; }

    /* ── RULE ── */
    .h-rule { width: 36px; height: 1px; background: var(--rule); margin: 36px 0 28px; }

    /* ── SECTION LABEL ── */
    .slabel {
      font-family: var(--sans); font-size: 0.66rem; letter-spacing: 0.16em;
      text-transform: uppercase; color: var(--ink-light); margin-bottom: 36px;
    }

    /* ── LAYOUT ── */
    .inner { max-width: var(--max); margin: 0 auto; }
    .section { padding: clamp(72px, 10vw, 120px) var(--gutter); }
    .section.tight { padding-top: clamp(52px, 7vw, 80px); padding-bottom: clamp(52px, 7vw, 80px); }

    /* ── COLLAGE HERO ── */
    .hero-wrap {
      min-height: calc(100vh - 60px);
      padding: 60px var(--gutter) 80px;
      display: grid;
      grid-template-columns: 1fr 1fr;
      gap: 0;
      max-width: calc(var(--max) + var(--gutter) * 2);
      margin: 0 auto;
      align-items: center;
      position: relative;
    }
    @media (max-width: 800px) {
      .hero-wrap { grid-template-columns: 1fr; min-height: auto; padding-top: 48px; }
    }

    .hero-text-col {
      display: flex; flex-direction: column; justify-content: center;
      padding-right: clamp(24px, 4vw, 60px);
      position: relative; z-index: 2;
    }

    .hero-name {
      font-size: clamp(3.8rem, 8.5vw, 8.5rem);
      line-height: 0.95;
      letter-spacing: -0.035em;
      margin-bottom: 0;
    }

    .hero-name-italic {
      font-family: var(--cormorant);
      font-style: italic;
      font-size: clamp(4rem, 9vw, 9.2rem);
      line-height: 0.92;
      letter-spacing: -0.02em;
      color: var(--ink);
      display: block;
    }

    .hero-sub-row {
      margin-top: 32px;
      display: flex; flex-direction: column; gap: 14px;
      max-width: 420px;
    }

    /* ── HERO PHOTO COLLAGE ── */
    .hero-photo-col {
      position: relative;
      height: clamp(480px, 70vh, 680px);
    }
    @media (max-width: 800px) {
      .hero-photo-col { height: 460px; margin-top: 40px; }
    }

    .collage-img {
      position: absolute;
      object-fit: cover;
      border-radius: 2px;
      box-shadow: 0 4px 24px rgba(0,0,0,0.12);
    }

    /* ── SPLIT CARDS ── */
    .split-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 2px; margin-top: 0; }
    @media (max-width: 680px) { .split-grid { grid-template-columns: 1fr; } }

    .split-card {
      padding: clamp(36px, 5vw, 64px) clamp(28px, 4vw, 52px);
      cursor: pointer; display: flex; flex-direction: column; gap: 16px;
      background: var(--bg-warm); transition: background 0.2s;
      border: none; text-align: left; color: inherit;
    }
    .split-card:hover { background: #eeeae3; }
    .split-card-dark { background: #141210; }
    .split-card-dark:hover { background: #1d1a17; }
    .split-num {
      font-family: var(--cormorant); font-style: italic;
      font-size: 2.8rem; line-height: 1; color: #d0cbc2;
    }
    .split-card-dark .split-num { color: #2e2a26; }
    .split-title {
      font-family: var(--serif); font-size: clamp(1.3rem, 2.5vw, 1.9rem);
      line-height: 1.15; color: var(--ink);
    }
    .split-card-dark .split-title { color: #e8e4dc; }
    .split-body { font-size: 0.88rem; line-height: 1.7; color: var(--ink-mid); }
    .split-card-dark .split-body { color: #6b6560; }
    .split-arrow {
      font-family: var(--sans); font-size: 0.7rem; letter-spacing: 0.1em;
      text-transform: uppercase; color: var(--ink-light);
      display: flex; align-items: center; gap: 8px; margin-top: 4px;
      transition: gap 0.18s;
    }
    .split-card-dark .split-arrow { color: #4a4540; }
    .split-arrow::after { content: '→'; transition: transform 0.18s; }
    .split-card:hover .split-arrow::after { transform: translateX(4px); }

    /* ── FOUNDER HERO ── */
    .f-hero {
      background: #141210;
      padding: clamp(100px, 14vw, 160px) var(--gutter) clamp(80px, 10vw, 120px);
      position: relative; overflow: hidden;
    }
    .f-hero-inner { max-width: var(--max); margin: 0 auto; position: relative; z-index: 2; }
    .f-hero .eyebrow { color: #3a3630; margin-bottom: 28px; }
    .f-hero h1 {
      font-family: var(--serif);
      font-size: clamp(2.8rem, 6.5vw, 6rem);
      color: #e8e4dc; line-height: 1.05; margin-bottom: 28px;
      max-width: 780px;
    }
    .f-hero h1 em {
      font-family: var(--cormorant); font-style: italic;
      font-size: 1.12em; letter-spacing: -0.01em;
      color: #c0b8ac;
    }
    .f-hero p { color: #5a5550; max-width: 540px; font-size: 0.98rem; line-height: 1.8; margin-bottom: 40px; }

    /* ── YOUTH HERO ── */
    .y-hero {
      padding: clamp(90px, 12vw, 140px) var(--gutter) clamp(70px, 9vw, 110px);
      background: var(--bg);
    }
    .y-hero-inner { max-width: var(--max); margin: 0 auto; }
    .y-hero .eyebrow { margin-bottom: 28px; }
    .y-hero h1 {
      font-family: var(--serif);
      font-size: clamp(2.4rem, 6vw, 5.6rem);
      color: var(--ink); line-height: 1.06; max-width: 820px; margin-bottom: 24px;
    }
    .y-hero h1 em {
      font-family: var(--cormorant); font-style: italic; font-size: 1.08em;
      color: var(--accent);
    }
    .y-hero p { color: var(--ink-mid); max-width: 520px; font-size: 0.98rem; line-height: 1.8; margin-bottom: 36px; }

    /* ── PROCESS ── */
    .process-grid {
      display: grid; grid-template-columns: 1fr 1fr;
      gap: 1px; background: var(--rule); border: 1px solid var(--rule);
      margin-top: 52px;
    }
    @media (max-width: 680px) { .process-grid { grid-template-columns: 1fr; } }
    .process-item {
      background: var(--bg);
      padding: clamp(28px, 3.5vw, 46px) clamp(24px, 3.5vw, 42px);
      display: flex; flex-direction: column; gap: 12px;
    }
    .process-num { font-family: var(--sans); font-size: 0.68rem; color: var(--ink-light); letter-spacing: 0.08em; }
    .process-title { font-family: var(--serif); font-size: clamp(1.1rem, 1.8vw, 1.4rem); color: var(--ink); }
    .process-body { font-size: 0.88rem; line-height: 1.78; color: var(--ink-mid); }

    /* ── ABOUT / BODY ── */
    .prose p { font-size: clamp(0.92rem, 1.3vw, 1rem); line-height: 1.84; color: var(--ink-mid); margin-bottom: 20px; }
    .prose p:last-child { margin-bottom: 0; }

    /* ── PULL QUOTE ── */
    .pull-quote {
      font-family: var(--cormorant); font-style: italic;
      font-size: clamp(1.6rem, 3.2vw, 2.8rem);
      line-height: 1.4; color: var(--ink);
      text-align: center; padding: clamp(52px, 8vw, 96px) var(--gutter);
    }
    .pull-quote span { display: block; max-width: 720px; margin: 0 auto; }
    .pull-quote.warm { background: var(--bg-warm); }
    .pull-quote.dark { background: #141210; color: #c0b8ac; }

    /* ── FREE CARD ── */
    .free-card { padding: clamp(36px, 5vw, 56px); background: var(--bg-warm); margin-bottom: 2px; }
    .free-card h3 { font-family: var(--serif); font-size: clamp(1.3rem, 2.2vw, 1.9rem); margin-bottom: 16px; }
    .free-card p { font-size: 0.92rem; line-height: 1.78; color: var(--ink-mid); margin-bottom: 12px; max-width: 620px; }
    .free-card p:last-of-type { margin-bottom: 24px; }
    .free-card.coming { background: transparent; border: 1px solid var(--rule); }
    .coming-tag {
      display: inline-block; font-size: 0.62rem; letter-spacing: 0.14em;
      text-transform: uppercase; color: var(--ink-light);
      border: 1px solid #d8d4cc; padding: 3px 9px; margin-bottom: 16px;
    }

    /* ── PROGRESS ── */
    .progress-item {
      padding: clamp(26px, 3.5vw, 40px) 0;
      border-bottom: 1px solid var(--rule);
      display: grid; grid-template-columns: 150px 1fr; gap: 32px; align-items: start;
    }
    .progress-item:first-child { border-top: 1px solid var(--rule); }
    @media (max-width: 640px) { .progress-item { grid-template-columns: 1fr; gap: 8px; } }
    .progress-label {
      font-size: 0.66rem; letter-spacing: 0.12em; text-transform: uppercase;
      color: var(--ink-light); padding-top: 3px;
    }
    .progress-content h3 { font-family: var(--serif); font-size: 1.15rem; margin-bottom: 8px; }
    .progress-content p { font-size: 0.88rem; line-height: 1.72; color: var(--ink-mid); }

    /* ── SCATTERED PHOTO COLLAGE (about page) ── */
    .collage-section {
      position: relative; padding: clamp(60px, 8vw, 100px) var(--gutter);
      overflow: hidden;
    }
    .collage-section .inner { position: relative; z-index: 2; }

    .photo-scattered {
      position: relative;
      margin: clamp(32px, 5vw, 60px) 0;
    }

    .photo-item {
      display: inline-block;
      box-shadow: 0 3px 20px rgba(0,0,0,0.1);
      border-radius: 1px;
      overflow: hidden;
      background: #fff;
      padding: 6px 6px 28px;
    }
    .photo-item img { display: block; }
    .photo-caption {
      font-family: var(--sans); font-size: 0.62rem;
      letter-spacing: 0.06em; color: #aaa8a0;
      text-align: center; padding-top: 8px;
    }

    /* ── STORY COLLAGE (youth about) ── */
    .story-block {
      display: grid;
      grid-template-columns: 1fr 1fr;
      gap: clamp(32px, 5vw, 60px);
      align-items: start;
      margin-bottom: clamp(48px, 6vw, 72px);
    }
    @media (max-width: 780px) { .story-block { grid-template-columns: 1fr; } }

    .story-block.reverse { direction: rtl; }
    .story-block.reverse > * { direction: ltr; }

    /* ── PHOTO IMAGE ── */
    .photo-frame {
      position: relative;
    }
    .photo-frame img {
      width: 100%; display: block;
      object-fit: cover;
    }
    .photo-frame.angled { transform: rotate(-1.5deg); box-shadow: 0 4px 24px rgba(0,0,0,0.12); }
    .photo-frame.angled-right { transform: rotate(1.8deg); box-shadow: 0 4px 24px rgba(0,0,0,0.12); }

    /* ── FOUNDER PHOTO SECTION ── */
    .founder-photo-section {
      display: grid;
      grid-template-columns: 1fr 1fr;
      min-height: 520px;
    }
    @media (max-width: 780px) { .founder-photo-section { grid-template-columns: 1fr; } }
    .founder-photo { width: 100%; height: 100%; object-fit: cover; display: block; }
    .founder-text-panel {
      padding: clamp(44px, 6vw, 80px);
      display: flex; flex-direction: column; justify-content: center;
      background: var(--bg-warm);
    }
    .founder-text-panel h2 { font-family: var(--serif); font-size: clamp(1.5rem, 2.8vw, 2.4rem); margin-bottom: 18px; }
    .founder-text-panel p { font-size: 0.92rem; line-height: 1.78; color: var(--ink-mid); margin-bottom: 12px; }
    .founder-text-panel p:last-of-type { margin-bottom: 28px; }

    /* ── WHY ME ── */
    .why-grid {
      display: grid; grid-template-columns: 1fr 1fr;
      gap: clamp(40px, 7vw, 96px); align-items: center;
    }
    @media (max-width: 780px) { .why-grid { grid-template-columns: 1fr; } }
    .why-grid h2 { font-family: var(--serif); font-size: clamp(1.5rem, 2.8vw, 2.6rem); margin-bottom: 18px; }
    .why-grid p { font-size: 0.92rem; line-height: 1.78; color: var(--ink-mid); margin-bottom: 14px; }
    .why-grid p:last-of-type { margin-bottom: 28px; }

    /* ── FOOTER ── */
    footer { background: #141210; color: #4a4540; padding: clamp(44px, 6vw, 68px) var(--gutter); }
    .footer-inner {
      max-width: var(--max); margin: 0 auto;
      display: grid; grid-template-columns: 1fr 1fr 1fr; gap: 40px;
    }
    @media (max-width: 640px) { .footer-inner { grid-template-columns: 1fr; } }
    .footer-brand { font-family: var(--serif); font-size: 1.2rem; color: #c0b8ac; margin-bottom: 8px; }
    .footer-tagline { font-size: 0.78rem; line-height: 1.7; }
    .footer-col-label { font-size: 0.6rem; letter-spacing: 0.16em; text-transform: uppercase; color: #2e2a26; margin-bottom: 12px; }
    .footer-links { display: flex; flex-direction: column; gap: 8px; list-style: none; }
    .footer-links a { font-size: 0.82rem; color: #4a4540; text-decoration: none; transition: color 0.18s; }
    .footer-links a:hover { color: #c0b8ac; }
    .footer-bottom {
      max-width: var(--max); margin: 40px auto 0; padding-top: 20px;
      border-top: 1px solid #1e1b18;
      display: flex; justify-content: space-between; align-items: center;
      font-size: 0.72rem;
    }
    @media (max-width: 520px) { .footer-bottom { flex-direction: column; gap: 6px; } }

    /* ── ABOUT GRID ── */
    .about-grid {
      display: grid; grid-template-columns: 300px 1fr;
      gap: clamp(40px, 6vw, 80px); align-items: start;
    }
    @media (max-width: 780px) { .about-grid { grid-template-columns: 1fr; } }

    /* ── ANGLED CAPTION PHOTOS (small throwaways) ── */
    .throwback-photo {
      max-width: 280px;
      box-shadow: 0 3px 18px rgba(0,0,0,0.1);
      border-radius: 1px;
      overflow: hidden;
      background: #fff;
      padding: 5px 5px 24px;
    }
    .throwback-photo img { display: block; width: 100%; }
    .throwback-caption {
      font-size: 0.6rem; letter-spacing: 0.06em; text-align: center;
      color: #b0aba0; padding-top: 6px;
    }


    /* ── ANGELA EDIT: polished editorial refresh ── */
    :root {
      --bg: #f6f1e8;
      --bg-warm: #ebe2d4;
      --ink: #171717;
      --ink-mid: #4c4740;
      --ink-light: #857d72;
      --accent: #0f5f68;
      --accent-2: #b94d2d;
      --rule: #d7ccb9;
      --sky: #dcebf4;
      --sage: #d6ddca;
    }
    body { background: var(--bg); }
    nav { height: 64px; background: rgba(246,241,232,.9); backdrop-filter: blur(18px); }
    nav.dark { background: rgba(23,23,23,.94); }
    .nav-logo { font-family: var(--sans); font-weight: 500; letter-spacing: -0.02em; }
    .nav-cta, .btn-ink { background: var(--ink) !important; color: #fff !important; border-radius: 999px; }
    .btn, .nav-cta { border-radius: 999px; }
    .btn-outline { border-radius: 999px; border-color: #b6aa98; }
    .page { padding-top: 64px; }

    .editorial-hero {
      min-height: calc(100vh - 64px);
      padding: clamp(42px, 6vw, 72px) var(--gutter) clamp(56px, 7vw, 90px);
      display: grid;
      grid-template-rows: auto auto;
      gap: clamp(34px, 5vw, 54px);
      max-width: calc(var(--max) + var(--gutter) * 2);
      margin: 0 auto;
    }
    .hero-top {
      display: grid;
      grid-template-columns: minmax(0, 1.05fr) minmax(320px, .72fr);
      gap: clamp(34px, 6vw, 86px);
      align-items: center;
    }
    .hero-kicker { margin-bottom: clamp(18px, 2vw, 28px); color: var(--accent); }
    .editorial-title {
      font-family: var(--sans);
      font-size: clamp(4.3rem, 12vw, 11.5rem);
      line-height: .82;
      letter-spacing: -.055em;
      font-weight: 500;
      color: var(--ink);
      max-width: 980px;
    }

function useTweaks(def) {
  const [v, setV] = React.useState(def);

    const e = typeof k === 'object' ? k : { [k]: val };
    setV(p => ({ ...p, ...e }));
    window.parent.postMessage({ type: '__edit_mode_set_keys', edits: e }, '*');
  }, []);
  return [v, set];
}
function TweaksPanel({ children }) {
  const [open, setOpen] = React.useState(false);
  const ref = React.useRef(null);
  const pos = React.useRef({ r: 16, b: 16 });
  React.useEffect(() => {
    const fn = e => {
      if (e?.data?.type === '__activate_edit_mode') setOpen(true);
      else if (e?.data?.type === '__deactivate_edit_mode') setOpen(false);
    };
    window.addEventListener('message', fn);
    window.parent.postMessage({ type: '__edit_mode_available' }, '*');
    return () => window.removeEventListener('message', fn);
  }, []);
  const dismiss = () => { setOpen(false); window.parent.postMessage({ type: '__edit_mode_dismissed' }, '*'); };
  const drag = e => {
    const p = ref.current; if (!p) return;
    const r = p.getBoundingClientRect(), sx = e.clientX, sy = e.clientY;
    const sr = window.innerWidth - r.right, sb = window.innerHeight - r.bottom;
    const mv = ev => { pos.current = { r: Math.max(8, sr - (ev.clientX - sx)), b: Math.max(8, sb - (ev.clientY - sy)) }; p.style.right = pos.current.r + 'px'; p.style.bottom = pos.current.b + 'px'; };
    const up = () => { removeEventListener('mousemove', mv); removeEventListener('mouseup', up); };
    addEventListener('mousemove', mv); addEventListener('mouseup', up);
  };
  if (!open) return null;
  return <>
    <style>{__TWK}</style>
    <div ref={ref} className="twk-panel" style={{ right: pos.current.r, bottom: pos.current.b }}>
      <div className="twk-hd" onMouseDown={drag}><b>Tweaks</b><button className="twk-x" onMouseDown={e => e.stopPropagation()} onClick={dismiss}>✕</button></div>
      <div className="twk-body">{children}</div>
    </div>
  </>;
}
function TweakSection({ label }) { return <div className="twk-sect">{label}</div>; }
function TweakRadio({ label, value, options, onChange }) {
  const ref = React.useRef(null);
  const opts = options.map(o => typeof o === 'object' ? o : { value: o, label: o });
  const n = opts.length, idx = Math.max(0, opts.findIndex(o => o.value === value));
  const vr = React.useRef(value); vr.current = value;
  const at = cx => { const r = ref.current.getBoundingClientRect(); return opts[Math.max(0, Math.min(n - 1, Math.floor(((cx - r.left - 2) / (r.width - 4)) * n)))].value; };
  const pd = e => { const v0 = at(e.clientX); if (v0 !== vr.current) onChange(v0); const mv = ev => { const v = at(ev.clientX); if (v !== vr.current) onChange(v); }; const up = () => { removeEventListener('pointermove', mv); removeEventListener('pointerup', up); }; addEventListener('pointermove', mv); addEventListener('pointerup', up); };
  return <div className="twk-row"><div className="twk-lbl"><span>{label}</span></div><div ref={ref} className="twk-seg" onPointerDown={pd}><div className="twk-seg-thumb" style={{ left: `calc(2px + ${idx} * (100% - 4px) / ${n})`, width: `calc((100% - 4px) / ${n})` }} />{opts.map(o => <button key={o.value} type="button">{o.label}</button>)}</div></div>;
}

      <div className="section tight">

              <p>What I didn't know was that my dad wasn't going to stop.</p>
            </div>

              <img

                alt="Angela with studio lights"

              />
              {/* 12 year old throwback — small, lower right */}

                <img src="vlogger-age12.jpg" alt="Foxifullies YouTube channel, age 12" />
                <div className="throwback-caption">Foxifullies, 2017</div>
              </div>
            </div>
          </div>

          {/* PULL QUOTE inline */}
          <div style={{borderTop:'1px solid var(--rule)',borderBottom:'1px solid var(--rule)',padding:'clamp(28px,4vw,44px) 0',margin:'0 0 clamp(48px,6vw,72px)'}}>
            <p style={{fontFamily:'var(--cormorant)',fontStyle:'italic',fontSize:'clamp(1.4rem,2.8vw,2.2rem)',lineHeight:1.45,color:'var(--ink)',maxWidth:'640px'}}>
              "He held a version of me that I had stopped holding for myself."
            </p>
          </div>

          {/* STORY BLOCK 2 — dad at Arsenal / continued */}
          <div style={{display:'grid',gridTemplateColumns:'1fr 1fr',gap:'clamp(36px,5vw,64px)',alignItems:'start',marginBottom:'clamp(48px,6vw,72px)'}}>
            <div style={{position:'relative'}}>
              <img
                src="dad-arsenal.jpg"
                alt="Angela and her dad at Arsenal"
                style={{width:'85%',display:'block',objectFit:'cover',aspectRatio:'1',objectPosition:'center top',transform:'none',boxShadow:'0 5px 24px rgba(0,0,0,0.11)'}}
              />
            </div>
            <div className="prose">
              <p>Secondary two: Filmora. Secondary four: a MacBook Pro with Final Cut Pro and Logic Pro. And then, right before my A-levels, when I told him I was saving up for a camera, he said stop. Focus on your exams. I'll handle the camera.</p>
              <p>We went after my last paper. Bought one for $2,000. Lenses included. I remember sitting in the shop thinking — he watched me quit. Watched me delete everything, go silent. And he just kept going. Kept treating me like someone who was going to come back to this.</p>
              <p>That's the moment I keep returning to. Not the camera. Not the money. The fact that he held a version of me that I had stopped holding for myself.</p>

              <p>So I quietly told myself I didn't enjoy it anymore. It's easier than admitting you're scared.</p>
            </div>

            <div style={{position:'relative'}}>
              <img
                src="halogen.jpg"

                style={{width:'100%',display:'block',objectFit:'cover',aspectRatio:'4/3',objectPosition:'center top',transform:'none',boxShadow:'0 5px 24px rgba(0,0,0,0.11)'}}
              />
            </div>
            <div className="prose">
              <p>I'm nineteen, turning twenty. I'm a first-year student at SMU. I'm running a business helping founders find and tell their stories. I'm posting every day. I wrote a guide about the thing I kept bumping into: the way ego gets in the way of ambition.</p>
              <p>Not arrogance. The quiet kind. The kind that makes you quit before anyone can see you fail. The kind that makes you decide you don't enjoy something anymore rather than admit you're afraid to be bad at it.</p>

              </div>
            </div>
          </div>

        </div>
      </div>

      <Footer navigate={navigate} />
    </div>

  const navigate = React.useCallback(p => { setPage(p); window.scrollTo({ top: 0 }); }, []);

  React.useEffect(() => {
    document.documentElement.style.setProperty('--accent', tweaks.accentColor);
  }, [tweaks.accentColor]);

  const pages = {
    'home': <HomePage navigate={navigate} />,
    'founder': <FounderPage navigate={navigate} />,
    'founder-process': <FounderProcessPage navigate={navigate} />,
    'founder-about': <FounderAboutPage navigate={navigate} />,
    'youth': <YouthPage navigate={navigate} />,
    'youth-free': <YouthFreePage navigate={navigate} />,
    'youth-progress': <YouthProgressPage navigate={navigate} />,
    'youth-about': <YouthAboutPage navigate={navigate} />,
  };

  return (
    <>
      <Nav page={page} navigate={navigate} />
      {pages[page] || pages['home']}
      <TweaksPanel>
        <TweakSection label="Preview Path" />
        <TweakRadio
          label="Path"
          value={page.startsWith('founder') ? 'founder' : page.startsWith('youth') ? 'youth' : 'home'}

  );
}
